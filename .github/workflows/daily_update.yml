name: MLB Predictor — Actualización diaria

on:
  # Corre todos los días a las 15:00 UTC = 9:00 AM CST (México)
  schedule:
    - cron: "0 15 * * *"

  # También permite correrlo manualmente desde GitHub
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Descargar código
        uses: actions/checkout@v4

      - name: 🐍 Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Instalar dependencias
        run: pip install requests pytz

      - name: ⚾ Actualizar datos MLB
        run: python scripts/update_data.py

      - name: 💾 Guardar cambios en el repositorio
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.json public/history.json
          git diff --staged --quiet || git commit -m "🤖 Datos MLB actualizados — $(date +'%d/%m/%Y')"
          git push

      - name: 🚀 Deploy a Netlify
        uses: nwtgck/actions-netlify@v2
        with:
          publish-dir: "./public"
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Auto-deploy ${{ github.run_number }} — $(date +'%d/%m/%Y')"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}
