name: Backfill historico MLB 2026
on:
  workflow_dispatch:
jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4
      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependencias
        run: pip install requests pytz
      - name: Correr backfill
        run: python backfill_history.py
      - name: Guardar historial actualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/history.json
          git diff --staged --quiet || git commit -m "Backfill historico temporada 2026"
          git push
